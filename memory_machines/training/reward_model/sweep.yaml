command:
  - ${env}
  - python
  - -m
  - memory_machines.training.reward_model.train
  - ${args}
method: grid
project: memory-machines-reward-model

parameters:
  # Fixed paths
  data_dir:
    value: memory_machines/training/data/reward_model

  # Model (single model for reward model)
  base_model:
    value: Qwen/Qwen3-0.6B # ~600M params

  # Hyperparameter sweeps (essay specs)
  learning_rate:
    values: [5e-6, 2e-5, 5e-5]

  batch_size:
    values: [4, 8]

  epochs:
    values: [1, 2, 3]

  # Fixed config
  max_length:
    value: 2048

  seed:
    value: 42

  wandb_project:
    value: memory-machines-reward-model

metric:
  name: eval/accuracy
  goal: maximize
